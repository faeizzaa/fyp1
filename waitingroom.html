<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue | Tickago</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #181c24;
            --accent-blue: #00f0ff;
            --accent-green: #2ecc71;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .queue-container {
            max-width: 480px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-blue);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .status-badge.live {
            background: rgba(46, 204, 113, 0.1);
            color: var(--accent-green);
        }

        h2 {
            font-size: 1.6rem;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 30px 0;
        }

        .spinner-box {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 40px;
            margin-bottom: 20px;
        }

        .pulse-loader {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .timer-display {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
            color: #ffffff;
        }

        .btn-queue {
            background: #242b35;
            color: rgba(255, 255, 255, 0.25);
            border: none;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            cursor: not-allowed;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-queue.active {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="queue-container">
    <div id="badge" class="status-badge">Waiting Room</div>
    <h2 id="headline">You're in the waiting line</h2>
    
    
    <div class="spinner-box" id="spinner-container">
        <div class="pulse-loader"></div>
    </div>

    <div class="timer-display" id="timer-display">--:--</div>
    
    <p id="subtext">Please stay on this page to maintain your spot in line. Do not refresh.</p>
    
    <button id="enter-btn" class="btn-queue">Sale Starting Soon</button>
</div>

<script src="config.js"></script>

<script>
    // Automatically cleans up any accidental trailing slash from config.js
    let cleanHost = typeof NGROK_URL !== 'undefined' ? NGROK_URL : "http://127.0.0.1:8000";
    if (cleanHost.endsWith('/')) {
        cleanHost = cleanHost.slice(0, -1);
    }

    let isSaleLive = false;
    let currentCountdown = 0;

    async function synchronizeClock() {
        try {

            // This now guarantees a clean, single-slash URL every single time
            const response = await fetch(`${cleanHost}/api/sale-status`, {
                method: 'GET',
            headers: {
                    "ngrok-skip-browser-warning": "true"
            }
            });     

            if (!response.ok) throw new Error(`HTTP downstream lag error: ${response.status}`);

            const data = await response.json();
            currentCountdown = data.countdown;
            
            if (data.isSaleLive || data.countdown <= 0) {
                clearInterval(syncLoop);
                isSaleLive = true;
                
                document.getElementById('badge').innerText = "On Sale";
                document.getElementById('badge').className = "status-badge live";
                document.getElementById('headline').innerText = "Sale is Now Live!";
                document.getElementById('subtext').innerText = "Tickets are now available. Proceed to select your seats.";
                document.getElementById('spinner-container').style.display = 'none';
                document.getElementById('timer-display').style.display = 'none';
                
                const btn = document.getElementById('enter-btn');
                btn.innerText = "Select My Seats";
                btn.className = "btn-queue active"; 
            } 

        } catch (err) {
            console.warn("Could not sync with central ticket pool server:", err);
            document.getElementById('timer-display').innerText = "--:--";
            document.getElementById('enter-btn').innerText = "Syncing Clock...";
            document.getElementById('subtext').innerText = "Establishing a secure session channel connection...";
        }
    }

    setInterval(() => {

    if (!isSaleLive && currentCountdown > 0) {

        currentCountdown--;

        let minutes = Math.floor(currentCountdown / 60);
        let seconds = currentCountdown % 60;

        document.getElementById('timer-display').innerText =
            `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        }

    }, 1000);

    synchronizeClock();
    const syncLoop = setInterval(synchronizeClock, 1000);

    document.getElementById('enter-btn').addEventListener('click', function() {
        if (!isSaleLive) return;

        // Stamp a one-use token so salelive.html can verify this user
        // actually waited through the countdown and wasn't a bot bypass.
        sessionStorage.setItem('gate_token', Date.now().toString());

        window.location.href = "salelive.html";
    });


</script>

</body>
</html>
