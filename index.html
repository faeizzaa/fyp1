<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stray Kids "Karma" World Tour | Tickago</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #181c24;
            --accent-blue: #00f0ff;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .landing-container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .banner {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #3b0066 0%, #110022 100%);
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-blue);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; }
        .btn-join {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: #ffffff;
            border: none;
            padding: 16px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
            transition: transform 0.2s;
        }
        .btn-join:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="landing-container">
    <div class="banner">STRAY KIDS</div>
    <h1>"Karma" World Tour Live</h1>
    <p>Official Ticketing Portal. The waiting room queue will open shortly. Click below to secure your placement in the line.</p>
    
    <button id="join-queue-btn" class="btn-join">Join Waiting Room</button>
</div>

<script>
    document.getElementById('join-queue-btn').addEventListener('click', function() {
        window.location.href = "waitingroom.html";
    });
</script>

<script src="config.js"></script>

</body>
</html>
