<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Tickago</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .error-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }
        .error-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }
        h1 {
            color: #f44336;
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .error-code {
            color: #666;
            font-family: monospace;
            margin-bottom: 20px;
        }
        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-home {
            display: inline-block;
            padding: 15px 30px;
            background: #0f3460;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .btn-home:hover {
            background: #1a4a7a;
        }
        .support-text {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">🚫</div>
        <h1>Access Denied</h1>
        <p class="error-code">Error Code: BOT_DETECTED_403</p>
        <p>
            Your session has been terminated due to suspicious activity 
            that violates our terms of service.
        </p>
        <p>
            If you believe this is a mistake, please try again later 
            or contact our support team.
        </p>
        <a href="home.html" class="btn-home">Return to Homepage</a>
        <p class="support-text">
            Reference ID: <span id="ref-id"></span>
        </p>
    </div>
    
    <script>
        // Generate random reference ID for support
        document.getElementById('ref-id').textContent = 
            'ERR-' + Math.random().toString(36).substring(2, 10).toUpperCase();
    </script>
</body>
</html>
